version: "3"
services:
  windows:
    image: dockurr/windows
    container_name: windows
    devices:
      - /dev/kvm
    cap_add:
      - NET_ADMIN
    ports:
      - 8006:8006
      - 3389:3389
    environment:
      VERSION: "10"
      RAM_SIZE: "4G"
      CPU_CORES: "4"
      USER: "admin"
      PASS: "password123"
    restart: on-failure
    
